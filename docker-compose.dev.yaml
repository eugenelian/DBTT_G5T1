version: "3.9"

services:
  ai-clinical-assistant-backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    ports:
      - "8000:8000"   # same as prod, can be overridden if needed
    volumes:
      - ./app/backend:/app/backend   # mount code for live reload
    env_file:
      - .env
    environment:
      ENV_TYPE: development
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  ai-clinical-assistant-frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    volumes:
      - ./app/frontend:/app/frontend   # optional: live changes in dev
    environment:
      ENV_TYPE: development
    depends_on:
      - ai-clinical-assistant-backend
    restart: unless-stopped
