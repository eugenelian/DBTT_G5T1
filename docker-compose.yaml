services:
  ai-clinical-assistant-backend:
    container_name: ai-clinical-assistant-backend
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      ENV_TYPE: production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  ai-clinical-assistant-frontend:
    container_name: ai-clinical-assistant-frontend
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    env_file:
      - .env
    environment:
      ENV_TYPE: production
    depends_on:
      - ai-clinical-assistant-backend
    restart: unless-stopped

networks:
  default:
    name: ai-clinical-assistant-network
